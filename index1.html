<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Euromonitor Industry Calendar FY26–27</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:      #1a2744;
    --navy-mid:  #243457;
    --teal:      #0e7c7b;
    --teal-lt:   #e8f5f5;
    --amber:     #e8a020;
    --bg:        #f4f5f7;
    --white:     #ffffff;
    --border:    #dde1e9;
    --text:      #1a2744;
    --muted:     #6b7694;
    --radius:    8px;

    /* Office colours */
    --chicago:     #2E4057;
    --london:      #C0392B;
    --saopauloC:   #27AE60;
    --mexicoC:     #E67E22;
    --santiagoC:   #8E44AD;
    --dubaiC:      #C9A800;
    --capetownC:   #E05A8A;
    --dusseldorfC: #2E86C1;
    --vilniusC:    #16A085;
    --bengaluruC:  #E74C3C;
    --shanghaiC:   #A93226;
    --singaporeC:  #1ABC9C;
    --tokyoC:      #E84393;
    --seoulC:      #3498DB;
    --otherC:      #95A5A6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ────────────────────────────────────────────────── */
  .cal-header {
    background: var(--navy);
    padding: 20px 28px 0;
    display: flex;
    align-items: flex-end;
    gap: 28px;
    flex-wrap: wrap;
  }
  .cal-title-block { padding-bottom: 18px; flex: 1; min-width: 200px; }
  .cal-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 4px;
  }
  .cal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: #fff;
    line-height: 1.2;
  }
  .cal-title em { font-style: italic; color: var(--amber); }

  /* ── Nav tabs ───────────────────────────────────────────────── */
  .cal-nav {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    flex-wrap: wrap;
    padding-bottom: 0;
  }
  .nav-btn {
    background: rgba(255,255,255,0.08);
    border: none;
    color: rgba(255,255,255,0.55);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 7px 13px 9px;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .nav-btn.active {
    background: var(--bg);
    color: var(--navy);
    font-weight: 600;
  }

  /* ── Toolbar ───────────────────────────────────────────────── */
  .toolbar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 12px 28px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .toolbar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 2px;
    white-space: nowrap;
  }
  .filter-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .filter-btn .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .filter-btn.inactive {
    background: #f0f2f7;
    color: var(--muted);
    border-color: transparent;
  }
  .filter-btn.inactive .dot { opacity: 0.4; }
  .filter-btn.active {
    background: white;
    border-color: currentColor;
  }
  .filter-all {
    background: var(--navy) !important;
    color: #fff !important;
    border-color: var(--navy) !important;
  }
  .filter-all .dot { background: var(--amber) !important; }
  .sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

  /* ── Main layout ───────────────────────────────────────────── */
  .main { padding: 20px 28px; }

  /* ── Month nav ─────────────────────────────────────────────── */
  .month-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .month-arrow {
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    background: white;
    cursor: pointer;
    font-size: 14px;
    color: var(--muted);
    transition: all .15s;
    flex-shrink: 0;
    user-select: none;
  }
  .month-arrow:hover { border-color: var(--navy); color: var(--navy); }
  .month-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--navy);
    min-width: 180px;
  }
  .month-subtitle {
    font-size: 11px;
    color: var(--muted);
    margin-left: 4px;
  }
  .event-count-badge {
    margin-left: auto;
    background: var(--teal);
    color: white;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 12px;
    letter-spacing: 0.05em;
  }

  /* ── Calendar grid ─────────────────────────────────────────── */
  .cal-grid {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .cal-days-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--navy);
  }
  .day-name {
    text-align: center;
    padding: 9px 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
  }
  .cal-weeks { }
  .cal-week {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-top: 1px solid var(--border);
  }
  .cal-cell {
    border-right: 1px solid var(--border);
    padding: 6px 5px 8px;
    min-height: 90px;
    position: relative;
    vertical-align: top;
  }
  .cal-cell:last-child { border-right: none; }
  .cal-cell.other-month .day-num { color: #ccc; }
  .cal-cell.today { background: #fffbf0; }
  .cal-cell.today .day-num {
    background: var(--amber);
    color: white;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .day-num {
    font-size: 11px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 4px;
    line-height: 1;
  }

  /* ── Event chips ───────────────────────────────────────────── */
  .event-chip {
    display: block;
    font-size: 9.5px;
    font-weight: 500;
    padding: 2px 5px;
    border-radius: 3px;
    margin-bottom: 2px;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: white;
    transition: opacity .1s, transform .1s;
    line-height: 1.4;
  }
  .event-chip:hover { opacity: 0.85; transform: scale(1.02); }
  .more-chip {
    font-size: 9px;
    color: var(--muted);
    font-weight: 600;
    padding: 1px 4px;
    cursor: pointer;
  }
  .more-chip:hover { color: var(--navy); text-decoration: underline; }

  /* ── TBD strip ─────────────────────────────────────────────── */
  .tbd-section {
    margin-top: 20px;
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .tbd-header {
    background: var(--navy-mid);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .tbd-header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 14px;
    color: white;
  }
  .tbd-header-sub {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    margin-left: auto;
  }
  .tbd-list {
    padding: 12px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tbd-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 500;
    color: white;
    cursor: pointer;
    transition: opacity .15s;
  }
  .tbd-chip:hover { opacity: 0.8; }
  .tbd-chip .tbd-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.6);
    flex-shrink: 0;
  }

  /* ── Modal ─────────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,15,30,0.55);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 12px;
    width: 100%;
    max-width: 520px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: modalIn .2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0)   scale(1); }
  }
  .modal-top {
    padding: 20px 22px 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .modal-office-tag {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: white;
    padding: 3px 9px;
    border-radius: 3px;
    margin-bottom: 8px;
  }
  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--navy);
    line-height: 1.3;
    padding-right: 28px;
  }
  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 28px; height: 28px;
    border: none; background: none;
    font-size: 18px; color: var(--muted);
    cursor: pointer; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .modal-close:hover { background: var(--bg); color: var(--navy); }
  .modal-body { padding: 16px 22px 20px; }
  .modal-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: flex-start;
  }
  .modal-icon {
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 1px;
    width: 18px;
    text-align: center;
  }
  .modal-key {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    min-width: 90px;
    flex-shrink: 0;
  }
  .modal-val {
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;
  }
  .modal-val a {
    color: var(--teal);
    text-decoration: none;
    word-break: break-all;
  }
  .modal-val a:hover { text-decoration: underline; }
  .modal-divider {
    height: 1px;
    background: var(--border);
    margin: 12px 0;
  }
  .attending-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 12px;
    color: white;
  }

  /* ── Stats bar ─────────────────────────────────────────────── */
  .stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: white;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .stat-pill strong { color: var(--navy); font-size: 13px; }

  /* ── Responsive ────────────────────────────────────────────── */
  @media (max-width: 680px) {
    .cal-header { padding: 16px 14px 0; }
    .main { padding: 14px; }
    .toolbar { padding: 10px 14px; gap: 6px; }
    .cal-cell { min-height: 60px; padding: 4px 3px 6px; }
    .event-chip { font-size: 8.5px; padding: 1px 4px; }
    .cal-title { font-size: 17px; }
  }
</style>
</head>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal"></div>
</div>

// ── State ──────────────────────────────────────────────────────────────────
let currentYear  = 2026;
let currentMonth = 0; // 0 = Jan
let activeFilter = 'ALL';

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const OFFICES = Object.keys(OFFICE_COLORS);

// ── Build office filter buttons ────────────────────────────────────────────
function buildFilters() {
  const container = document.getElementById('officeFilters');
  container.style.display = 'flex';
  container.style.gap = '6px';
  container.style.flexWrap = 'wrap';
  OFFICES.forEach(office => {
    const evCount = EVENTS.filter(e => e.office === office).length;
    if (evCount === 0) return;
    const btn = document.createElement('button');
    btn.className = 'filter-btn inactive';
    btn.dataset.office = office;
    btn.innerHTML = `<span class="dot" style="background:${OFFICE_COLORS[office]}"></span>${office}`;
    btn.onclick = () => setFilter(office, btn);
    container.appendChild(btn);
  });
}

function setFilter(office, btn) {
  activeFilter = office;
  // Reset all
  document.querySelectorAll('.filter-btn').forEach(b => {
    const isAll = b.dataset.office === 'ALL';
    b.className = 'filter-btn ' + (isAll ? 'filter-all ' : '') + 'inactive';
  });
  // Activate selected
  if (btn) {
    btn.className = 'filter-btn active' + (office === 'ALL' ? ' filter-all' : '');
  }
  renderCalendar();
}

// ── Build month nav tabs ───────────────────────────────────────────────────
function buildMonthNav() {
  const nav = document.getElementById('monthNav');
  nav.innerHTML = '';
  for (let m = 0; m < 12; m++) {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (m === currentMonth ? ' active' : '');
    btn.textContent = MONTHS[m].slice(0,3);
    btn.onclick = () => { currentMonth = m; renderAll(); };
    nav.appendChild(btn);
  }
}

function prevMonth() {
  if (currentMonth === 0) { currentMonth = 11; currentYear--; }
  else currentMonth--;
  renderAll();
}
function nextMonth() {
  if (currentMonth === 11) { currentMonth = 0; currentYear++; }
  else currentMonth++;
  renderAll();
}

// ── Filter events ──────────────────────────────────────────────────────────
function filteredEvents() {
  if (activeFilter === 'ALL') return EVENTS;
  return EVENTS.filter(e => e.office === activeFilter);
}

// ── Render calendar ────────────────────────────────────────────────────────
function renderCalendar() {
  const fEvents = filteredEvents();
  const year = currentYear, month = currentMonth;

  // Month title
  document.getElementById('monthTitle').textContent = MONTHS[month] + ' ' + year;
  const mCount = fEvents.filter(e => e.date && e.date.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)).length;
  document.getElementById('monthBadge').textContent = mCount + ' event' + (mCount !== 1 ? 's' : '');

  // Build day grid
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev  = new Date(year, month, 0).getDate();
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  // Map events to dates
  const evByDate = {};
  fEvents.forEach(ev => {
    if (!ev.date) return;
    const d = ev.date;
    if (!evByDate[d]) evByDate[d] = [];
    evByDate[d].push(ev);
  });

  const weeks = document.getElementById('calWeeks');
  weeks.innerHTML = '';

  let day = 1 - firstDay;
  while (day <= daysInMonth) {
    const weekDiv = document.createElement('div');
    weekDiv.className = 'cal-week';
    for (let wd = 0; wd < 7; wd++, day++) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell';
      let cellDate = '', cellDay = '';
      if (day < 1) {
        cell.classList.add('other-month');
        cellDay = daysInPrev + day;
        cellDate = `${year}-${String(month).padStart(2,'0') || '12'}-${String(cellDay).padStart(2,'0')}`;
      } else if (day > daysInMonth) {
        cell.classList.add('other-month');
        cellDay = day - daysInMonth;
        const nm = month + 2 > 12 ? 1 : month + 2;
        const ny = month + 2 > 12 ? year + 1 : year;
        cellDate = `${ny}-${String(nm).padStart(2,'0')}-${String(cellDay).padStart(2,'0')}`;
      } else {
        cellDay = day;
        cellDate = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        if (cellDate === todayStr) cell.classList.add('today');
      }

      const numDiv = document.createElement('div');
      numDiv.className = 'day-num';
      numDiv.textContent = cellDay;
      cell.appendChild(numDiv);

      // Add events
      const dayEvents = evByDate[cellDate] || [];
      const maxShow = 3;
      dayEvents.slice(0, maxShow).forEach(ev => {
        const chip = document.createElement('div');
        chip.className = 'event-chip';
        chip.style.background = OFFICE_COLORS[ev.office] || '#95A5A6';
        chip.textContent = ev.title;
        chip.title = ev.title;
        chip.onclick = () => openModal(ev);
        cell.appendChild(chip);
      });
      if (dayEvents.length > maxShow) {
        const more = document.createElement('div');
        more.className = 'more-chip';
        more.textContent = `+${dayEvents.length - maxShow} more`;
        more.onclick = () => showDayEvents(cellDate, dayEvents);
        cell.appendChild(more);
      }
      weekDiv.appendChild(cell);
    }
    weeks.appendChild(weekDiv);
  }

  // TBD section
  const tbdEvents = fEvents.filter(e => !e.date);
  document.getElementById('tbdCount').textContent = tbdEvents.length + ' events pending dates';
  const tbdList = document.getElementById('tbdList');
  tbdList.innerHTML = '';
  tbdEvents.forEach(ev => {
    const chip = document.createElement('div');
    chip.className = 'tbd-chip';
    chip.style.background = OFFICE_COLORS[ev.office] || '#95A5A6';
    chip.innerHTML = `<span class="tbd-dot"></span>${ev.title}`;
    chip.title = `${ev.office} · ${ev.dateRaw || 'TBD'}`;
    chip.onclick = () => openModal(ev);
    tbdList.appendChild(chip);
  });
  document.getElementById('tbdSection').style.display = tbdEvents.length ? 'block' : 'none';

  // Stats
  renderStats(fEvents);
}

function renderStats(fEvents) {
  const total = fEvents.length;
  const withDate = fEvents.filter(e => e.date).length;
  const offices = [...new Set(fEvents.map(e => e.office))].length;
  const bar = document.getElementById('statsBar');
  bar.innerHTML = `
    <div class="stat-pill">🗓 <strong>${total}</strong> total events</div>
    <div class="stat-pill">📍 <strong>${withDate}</strong> scheduled</div>
    <div class="stat-pill">🌍 <strong>${offices}</strong> office cities</div>
  `;
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal(ev) {
  const color = OFFICE_COLORS[ev.office] || '#95A5A6';
  const attendBg = ev.attending && ev.attending.toLowerCase().includes('present') ? '#0e7c7b'
    : ev.attending && ev.attending.toLowerCase().includes('speak') ? '#e8a020'
    : '#243457';

  function row(icon, key, val, isLink) {
    if (!val) return '';
    const valHtml = isLink ? `<a href="${val}" target="_blank" rel="noopener">${val}</a>` : val;
    return `<div class="modal-row">
      <span class="modal-icon">${icon}</span>
      <span class="modal-key">${key}</span>
      <span class="modal-val">${valHtml}</span>
    </div>`;
  }

  document.getElementById('modal').innerHTML = `
    <div class="modal-top">
      <div class="modal-office-tag" style="background:${color}">${ev.office}${ev.region ? ' · ' + ev.region : ''}</div>
      <div class="modal-title">${ev.title}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      ${row('📅','Date', ev.dateRaw || 'TBD')}
      ${row('🌍','Location', ev.country)}
      ${row('🏭','Industry', [ev.industry, ev.sector].filter(Boolean).join(' · '))}
      ${ev.attending ? `<div class="modal-row"><span class="modal-icon">🎤</span><span class="modal-key">Role</span><span class="modal-val"><span class="attending-badge" style="background:${attendBg}">${ev.attending}</span></span></div>` : ''}
      ${row('👤','Speakers', ev.speakers)}
      ${row('🏢','Executive', ev.executive)}
      ${ev.status ? `<div class="modal-divider"></div>${row('📋','Status', ev.status)}` : ''}
      ${ev.topic ? `${row('💡','Topic', ev.topic)}` : ''}
      ${ev.link && ev.link.startsWith('http') ? `<div class="modal-divider"></div>${row('🔗','Link', ev.link, true)}` : ''}
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function showDayEvents(dateStr, events) {
  const d = new Date(dateStr + 'T00:00:00');
  const label = d.toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'});
  document.getElementById('modal').innerHTML = `
    <div class="modal-top">
      <div class="modal-office-tag" style="background:var(--navy)">📅 ${label}</div>
      <div class="modal-title">${events.length} Events</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      ${events.map(ev => `
        <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="openModal(${JSON.stringify(ev).replace(/"/g,'&quot;')})">
          <div style="width:10px;height:10px;border-radius:50%;background:${OFFICE_COLORS[ev.office]||'#95A5A6'};flex-shrink:0"></div>
          <div>
            <div style="font-size:12px;font-weight:600;color:var(--navy)">${ev.title}</div>
            <div style="font-size:10px;color:var(--muted)">${ev.office} · ${ev.country}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
function renderAll() {
  buildMonthNav();
  renderCalendar();
}

buildFilters();
// Start on current month or first month with events
const today = new Date();
currentYear  = today.getFullYear() >= 2026 ? today.getFullYear() : 2026;
currentMonth = today.getFullYear() >= 2026 ? today.getMonth() : 0;
renderAll();
</script>
